name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Please review this pull request. Focus on:
            - Correctness and potential bugs
            - Security issues
            - Code quality and maintainability
            - Adherence to project conventions (Next.js App Router, shadcn/ui, Drizzle ORM, server actions pattern)
            Provide constructive feedback as PR review comments.
